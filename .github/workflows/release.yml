name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    name: Build and Release
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: kakaotalk-tablet-patcher-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: kakaotalk-tablet-patcher-macos-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: kakaotalk-tablet-patcher-macos-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: kakaotalk-tablet-patcher-windows-x86_64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare binary
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == *"-windows-"* ]]; then
            mv target/${{ matrix.target }}/release/kakaotalk-tablet-patcher.exe ${{ matrix.asset_name }}
          else
            mv target/${{ matrix.target }}/release/kakaotalk-tablet-patcher ${{ matrix.asset_name }}
          fi

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
