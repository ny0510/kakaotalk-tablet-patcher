name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    name: Build and Release
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: kakaotalk-tablet-patcher-linux
            asset_name: kakaotalk-tablet-patcher-linux
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: kakaotalk-tablet-patcher-macos
            asset_name: kakaotalk-tablet-patcher-macos
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: kakaotalk-tablet-patcher-windows.exe
            asset_name: kakaotalk-tablet-patcher-windows.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare binary
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cd target/${{ matrix.target }}/release
            mv kakaotalk-tablet-patcher.exe ../../../${{ matrix.asset_name }}
          else
            cd target/${{ matrix.target }}/release
            mv kakaotalk-tablet-patcher ../../../${{ matrix.asset_name }}
          fi

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
